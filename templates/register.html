<!DOCTYPE html>
<html>
<head>
    <title>Register - Ride Mate</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .reg-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .reg-card h2 { color: #2f6f62; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #2f6f62; }
        button { width: 100%; padding: 15px; background: #2f6f62; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #23544a; }
        .login-link { text-align: center; margin-top: 20px; color: #666; }
        .login-link a { color: #2f6f62; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="reg-card">
    <h2>Join Ride Mate 🚗</h2>

    <form method="post" action="/register">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name"  required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email"required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>🛡️ Emergency Contact</label>
            <input type="text" name="emergency_contact"  required>
        </div>

        <button type="submit">Create Account</button>
    </form>

    <div class="login-link">
        Already registered? <a href="/login">Login here</a>
    </div>
</div>

</body>
</html>
